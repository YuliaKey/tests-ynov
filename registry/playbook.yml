---
- name: Déploiment d'un Registry Docker Sécurisé
  hosts: registry_hosts
  become: true
  vars:
    project_dir: "/home/ubuntu/registry-stack"
    public_ip: "{{ ansible_host }}"

  tasks:
    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installation de Docker et outils
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - apache2-utils
          - openssl
          - python3-passlib
        state: present
    
    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes
    
    - name: Création des dossiers
      file: 
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: "0755"
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/auth"
        - "{{ project_dir }}/data"
        - "{{ project_dir }}/certs"
        - "{{ project_dir }}/nginx"

    - name: Génération du certificat SSL auto-signé
      command: >
        openssl req -x509 -nodes -days 365
        -newkey rsa:2048
        -keyout {{ project_dir }}/certs/registry.key
        -out {{ project_dir }}/certs/registry.crt
        -subj "/CN={{ public_ip }}"
      args:
        creates: "{{ project_dir }}/certs/registry.crt"

    - name: Copie de la configuration Nginx
      template:
        src: nginx.conf
        dest: "{{ project_dir }}/nginx/nginx.conf"
        owner: ubuntu
        group: ubuntu
        mode: "0644"

    - name: Génération mot de passe
      htpasswd:
        path: "{{ project_dir }}/auth/registry.password"
        name: "{{ registry_user }}"
        password: "{{ registry_password }}"
        owner: ubuntu
        group: ubuntu
        mode: "0640"
        crypt_scheme: bcrypt

    - name: Copie du docker-compose.yml
      template: 
        src: docker-compose.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Démarrage de la stack
      command: docker compose up -d
      args:
        chdir: "{{ project_dir }}"
