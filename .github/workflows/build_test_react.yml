name: Build and Test React Application

on:
  push: 
    branches: [master]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [20.x]
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v2
        with: 
          node-version: ${{ matrix.node_version }}
      - name: npm ci, build and test
        run: |
          npm ci
          npm run jsdoc
          npm run build --if-present
          npm test
        env:
          REACT_APP_API_URL: https://jsonplaceholder.typicode.com
          REACT_APP_SERVER_PORT: 3000
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with: 
          build: npm run build --if-present
          start: npm start
        env:
          REACT_APP_API_URL: https://jsonplaceholder.typicode.com
          REACT_APP_SERVER_PORT: 3000
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{secrets.CODECOV_TOKEN}}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with: 
          path: build
  
  publish_npm:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Use Node.js
        uses: actions/setup-node@v2
        with: 
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Check version and publish
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Local version: $LOCAL_VERSION"
          
          NPM_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          echo "NPM version: $NPM_VERSION"
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "New version detected, publishing..."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Build and publish package on NPM
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          git config --global user.email "jk182013@gmail.com"
          git config --global user.name "Yuliia Kolomiiets"
          npm run build-npm-ci
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
  validate_api:
    needs: publish_npm
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2

      - name: Build MySQL image
        run: docker build -t migration_mysql -f Dockerfile .

      - name: Build API image
        run: docker build -t apipython -f server/Dockerfile server/

      - name: Create Docker network
        run: docker network create test-network

      - name: Start MySQL container
        run: |
          docker run --name migration_container \
            --network test-network \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -p 3306:3306 \
            -d migration_mysql

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 30); do
            if docker exec migration_container mysqladmin ping -h localhost -p${{ secrets.MYSQL_ROOT_PASSWORD }} --silent 2>/dev/null; then
              break
            fi
            sleep 2
          done
          sleep 10
          docker exec migration_container mysql -uroot -p${{ secrets.MYSQL_ROOT_PASSWORD }} -e "USE ynov_ci; SELECT * FROM utilisateur;"

      - name: Start API container
        run: |
          docker run --name api_container \
            --network test-network \
            -e MYSQL_HOST=migration_container \
            -e MYSQL_USER=root \
            -e MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            -e MYSQL_DATABASE=ynov_ci \
            -p 8000:8000 \
            -d apipython

      - name: Wait for API to be ready
        run: |
          sleep 5
          docker logs api_container

      - name: Test API endpoint /users
        run: |
          RESPONSE=$(curl -s -o response.json -w "%{http_code}" http://localhost:8000/users)
          echo "HTTP Status: $RESPONSE"
          cat response.json
          if [ "$RESPONSE" -ne 200 ]; then
            echo "ERROR: API returned status $RESPONSE"
            exit 1
          fi
          USERS=$(cat response.json | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data.get('utilisateurs',[])))")
          echo "Number of users: $USERS"
          if [ "$USERS" -eq 0 ]; then
            echo "ERROR: User list is empty"
            exit 1
          fi
          echo "Test passed!"

      - name: Login to Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push API image to Docker Hub
        if: success()
        run: |
          docker tag apipython ${{ secrets.DOCKERHUB_USERNAME }}/apipython:0.0.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/apipython:0.0.1

  deploy:
    needs: validate_api
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4
