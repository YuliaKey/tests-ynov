name: Build and Test React Application

on:
  push: 
    branches: [master]

jobs:
  build_test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [20.x]
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v2
        with: 
          node-version: ${{ matrix.node_version }}
      - name: npm ci, build and test
        run: |
          npm ci
          npm run jsdoc
          npm run build --if-present
          npm test
        env:
          REACT_APP_SERVER_PORT: 8000
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        env:
          CODECOV_TOKEN: ${{secrets.CODECOV_TOKEN}}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with: 
          path: build
  
  publish_npm:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Use Node.js
        uses: actions/setup-node@v2
        with: 
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Check version and publish
        id: version_check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "Local version: $LOCAL_VERSION"
          
          NPM_VERSION=$(npm view $PACKAGE_NAME version 2>/dev/null || echo "0.0.0")
          echo "NPM version: $NPM_VERSION"
          
          if [ "$LOCAL_VERSION" != "$NPM_VERSION" ]; then
            echo "New version detected, publishing..."
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Build and publish package on NPM
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          git config --global user.email "jk182013@gmail.com"
          git config --global user.name "Yuliia Kolomiiets"
          npm run build-npm-ci
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
  e2e_cypress:
    needs: publish_npm
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env

      - name: Build and start the full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for all services to be healthy..."
          for i in $(seq 1 90); do
            DB_STATUS=$(docker inspect --format='{{.State.Health.Status}}' tests-ynov-db-1 2>/dev/null || echo "not found")
            SERVER_STATUS=$(docker inspect --format='{{.State.Health.Status}}' tests-ynov-server-1 2>/dev/null || echo "not found")
            FRONTEND_STATUS=$(docker inspect --format='{{.State.Health.Status}}' tests-ynov-frontend-1 2>/dev/null || echo "not found")
            echo "Attempt $i - db: $DB_STATUS, server: $SERVER_STATUS, frontend: $FRONTEND_STATUS"
            if [ "$DB_STATUS" = "healthy" ] && [ "$SERVER_STATUS" = "healthy" ] && [ "$FRONTEND_STATUS" = "healthy" ]; then
              echo "All services healthy!"
              break
            fi
            if [ $i -eq 90 ]; then
              echo "ERROR: Timeout waiting for services"
              docker compose logs
              exit 1
            fi
            sleep 5
          done

      - name: Check all containers are running
        run: |
          docker compose ps
          RUNNING=$(docker compose ps --status running -q | wc -l)
          echo "Running containers: $RUNNING"
          if [ "$RUNNING" -lt 4 ]; then
            echo "ERROR: Not all containers are running"
            docker compose logs
            exit 1
          fi

      - name: Run Cypress E2E tests
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3000

      - name: Upload Cypress screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload Cypress videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos

      - name: Cleanup
        if: always()
        run: docker compose down -v

  push_image:
    needs: e2e_cypress
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v2

      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env

      - name: Build API image
        run: docker compose build server

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push API image to Docker Hub
        run: |
          docker tag apipython ${{ secrets.DOCKERHUB_USERNAME }}/apipython:0.0.1
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/apipython:0.0.1

  deploy:
    needs: [e2e_cypress, push_image]
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    steps:
      - name: Deploy to Github pages
        id: deployment
        uses: actions/deploy-pages@v4