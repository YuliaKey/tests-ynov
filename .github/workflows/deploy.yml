name: Deploy Zero Touch

on:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Configure Docker for self-signed registry
        run: |
          sudo mkdir -p /etc/docker
          echo '{ "insecure-registries": ["${{ secrets.REGISTRY_URL }}"] }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Login to AWS Registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_URL }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build and push API image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/tests-ynov-api:latest -f server/Dockerfile server/
          docker push ${{ secrets.REGISTRY_URL }}/tests-ynov-api:latest

      - name: Build and push Frontend image
        run: |
          docker build -t ${{ secrets.REGISTRY_URL }}/tests-ynov-frontend:latest -f react.Dockerfile .
          docker push ${{ secrets.REGISTRY_URL }}/tests-ynov-frontend:latest

  terraform:
    name: Infrastructure Provisioning
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      public_ip: ${{ steps.tf_output.outputs.public_ip }}
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Get Terraform Outputs
        id: tf_output
        working-directory: infra
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> "$GITHUB_OUTPUT"
          terraform output -raw private_key_pem > ../key.pem
          chmod 600 ../key.pem

      - name: Upload SSH key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ssh-key
          path: key.pem
          retention-days: 1

      - name: Upload Terraform state
        uses: actions/upload-artifact@v4
        with:
          name: tfstate
          path: infra/terraform.tfstate
          retention-days: 1

  deploy:
    name: Configuration & Deployment
    needs: terraform
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Download SSH key
        uses: actions/download-artifact@v4
        with:
          name: ssh-key

      - name: Set key permissions
        run: chmod 600 key.pem

      - name: Generate dynamic inventory
        run: |
          echo "[app]" > inventory.ini
          echo "${{ needs.terraform.outputs.public_ip }} ansible_user=ubuntu ansible_ssh_private_key_file=key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'" >> inventory.ini

      - name: Wait for SSH to be ready
        run: |
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i key.pem ubuntu@${{ needs.terraform.outputs.public_ip }} echo "SSH OK"; then
              break
            fi
            echo "Attempt $i - waiting for SSH..."
            sleep 10
          done

      - name: Install Ansible
        run: sudo apt-get update && sudo apt-get install -y ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini ansible/playbook.yml \
            --extra-vars "registry_url=${{ secrets.REGISTRY_URL }}" \
            --extra-vars "registry_user=${{ secrets.REGISTRY_USER }}" \
            --extra-vars "registry_password=${{ secrets.REGISTRY_PASSWORD }}" \
            --extra-vars "mysql_root_password=${{ secrets.MYSQL_ROOT_PASSWORD }}"

      - name: Validate Frontend
        run: |
          for i in $(seq 1 30); do
            if curl -s --max-time 5 http://${{ needs.terraform.outputs.public_ip }}:3000 > /dev/null; then
              echo "Frontend OK"
              break
            fi
            echo "Attempt $i - waiting for Frontend..."
            sleep 10
          done
          curl -f http://${{ needs.terraform.outputs.public_ip }}:3000

      - name: Validate API
        run: |
          curl -f http://${{ needs.terraform.outputs.public_ip }}:8000/users

      - name: Print application URL
        run: |
          echo "Application deployee avec succes !"
          echo "Frontend : http://${{ needs.terraform.outputs.public_ip }}:3000"
          echo "API      : http://${{ needs.terraform.outputs.public_ip }}:8000/users"

  cleanup:
    name: Cleanup on failure
    needs: [terraform, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Clone Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Download Terraform state
        uses: actions/download-artifact@v4
        with:
          name: tfstate
          path: infra/

      - name: Terraform Init
        run: terraform init
        working-directory: infra

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
