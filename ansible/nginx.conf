server {
listen 443 ssl;
server_name _;
# Certificats SSL
ssl_certificate /etc/nginx/ssl/registry.crt;
ssl_certificate_key /etc/nginx/ssl/registry.key;
# Recommandations Docker pour gros fichiers
client_max_body_size 0;
chunked_transfer_encoding on;
# Routage vers le Registry (API Docker)
location /v2/ {
# Auth Basic gérée par le backend registry, on passe les headers
proxy_pass http://registry:5000;
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
}

# Routage vers l'Interface Graphique (Tout le reste)
location / {
proxy_pass http://ui:80;
proxy_set_header Host $http_host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
}
}