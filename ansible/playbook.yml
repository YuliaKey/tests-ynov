---
- name: Déploiement de la stack applicative
  hosts: app
  become: true
  vars:
    project_dir: "/home/ubuntu/app"

  tasks:
    - name: Mise à jour du cache APT
      apt:
        update_cache: yes

    - name: Installer Docker et dépendances
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present

    - name: Ajout de l'utilisateur ubuntu au groupe docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Reset de la connexion SSH
      meta: reset_connection

    - name: Création des répertoires
      file:
        path: "{{ item }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'
      loop:
        - "{{ project_dir }}"
        - "{{ project_dir }}/sqlfiles"

    - name: Copie des fichiers SQL d'initialisation
      copy:
        src: "../sqlfiles/"
        dest: "{{ project_dir }}/sqlfiles/"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Configuration Docker pour le registre privé (certificat auto-signé)
      copy:
        content: '{ "insecure-registries": ["{{ registry_url }}"] }'
        dest: /etc/docker/daemon.json
        mode: '0644'

    - name: Redémarrage du service Docker
      systemd:
        name: docker
        state: restarted

    - name: Authentification au registre privé
      shell: echo "{{ registry_password }}" | docker login {{ registry_url }} -u {{ registry_user }} --password-stdin
      become_user: ubuntu

    - name: Copie du docker-compose-prod.yml
      template:
        src: docker-compose-prod.yml
        dest: "{{ project_dir }}/docker-compose.yml"
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Nettoyage de la stack existante
      shell: docker compose down -v
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      ignore_errors: true

    - name: Démarrage de la stack
      shell: docker compose pull && docker compose up -d
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: compose_up
      ignore_errors: true


    - name: Logs du conteneur server
      shell: docker compose logs server --tail=100
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: server_logs
      ignore_errors: true

    - name: Afficher les logs server
      debug:
        var: server_logs.stdout_lines

    - name: Statut des conteneurs
      shell: docker compose ps
      args:
        chdir: "{{ project_dir }}"
      become_user: ubuntu
      register: compose_ps
      ignore_errors: true

    - name: Afficher le statut des conteneurs
      debug:
        var: compose_ps.stdout_lines

    - name: Échouer si la stack ne démarre pas
      fail:
        msg: "Le démarrage Docker Compose a échoué"
      when: compose_up.rc != 0
