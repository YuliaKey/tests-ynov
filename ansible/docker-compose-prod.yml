services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
      MYSQL_DATABASE: ynov_ci
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: "mysql -u root -p{{ mysql_root_password }} -e 'SELECT 1 FROM ynov_ci.utilisateur LIMIT 1;'"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

  server:
    image: "{{ registry_url }}/tests-ynov-api:latest"
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: "{{ mysql_root_password }}"
      MYSQL_DATABASE: ynov_ci
    ports:
      - "8000:8000"
    healthcheck:
      test: "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/users')\" || exit 1"
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

  frontend:
    image: "{{ registry_url }}/tests-ynov-frontend:latest"
    restart: always
    depends_on:
      server:
        condition: service_healthy
    environment:
      REACT_APP_SERVER_PORT: "8000"
    ports:
      - "3000:3000"

volumes:
  mysql_data:
